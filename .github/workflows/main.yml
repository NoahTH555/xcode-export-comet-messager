name: Build Xcode App from ZIP
on: [push]
jobs:
  build:
    runs-on: macos-14  # Good for Xcode 16.x
    steps:
    - uses: actions/checkout@v4
    - name: Unzip project files
      run: unzip '*.zip' -d . && rm *.zip
    - name: Install CocoaPods (if Podfile)
      run: |
        if [ -f Podfile ]; then
          sudo gem install cocoapods
          pod install
        fi
    - name: List Xcode versions (debug)
      run: ls /Applications | grep Xcode
    - name: Setup Xcode (latest)
      run: sudo xcode-select -s "$(ls -t /Applications | grep Xcode | head -1)"
    - name: Build & Test Workspace (if exists) or Project
      run: |
        if [ -f Comet.xcworkspace ]; then
          xcodebuild test -workspace Comet.xcworkspace -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        else
          xcodebuild test -project Comet.xcodeproj -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        fi
    - name: Archive App
      run: mkdir -p build && xcodebuild -project Comet.xcodeproj OR -workspace Comet.xcworkspace -scheme Comet -archivePath build/Comet.xcarchive archive
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: comet-app-build
        path: build/
