name: Build Comet Xcode App from ZIP
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Unzip project files
      run: unzip '*.zip' -d . && rm *.zip
    - name: Select Xcode 16 (latest stable)
      uses: mobiledevops/xcode-select-version-action@v1
      with:
        version: '16.2'  # Safe for macos-14 (16.3 if available post-Apr 2026)
    - name: Verify Xcode
      run: xcodebuild -version
    - name: Install CocoaPods (if Podfile)
      run: |
        if [ -f Podfile ]; then
          sudo gem install cocoapods
          pod install
        fi
    - name: Build & Test
      run: |
        if [ -f Comet.xcworkspace ]; then
          xcodebuild test -workspace Comet.xcworkspace -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        else
          xcodebuild test -project Comet.xcodeproj -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        fi
    - name: Archive App
      run: |
        mkdir -p build
        if [ -f Comet.xcworkspace ]; then
          xcodebuild -workspace Comet.xcworkspace -scheme Comet -archivePath build/Comet.xcarchive archive
        else
          xcodebuild -project Comet.xcodeproj -scheme Comet -archivePath build/Comet.xcarchive archive
        fi
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: comet-app-build
        path: build/
        retention-days: 7
