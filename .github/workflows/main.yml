name: Build Comet Messager App
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Unzip Comet-Messager.zip
      run: |
        unzip "Comet-Messager.zip" -d . -q -o && rm "Comet-Messager.zip"
        echo "=== FILES AFTER UNZIP ==="
        ls -la | head -20
        echo "=== XCODE PROJECTS ==="
        find . -name "*.xcodeproj" -o -name "*.xcworkspace" | head -5 || echo "None"
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.0.app
        xcodebuild -version
    - name: Install CocoaPods
      run: |
        if [ -f Podfile ]; then
          sudo gem install cocoapods
          pod install --repo-update
        fi
    - name: Build & Test Comet
      run: |
        # Find & cd to project dir
        PROJ_PATH=$(find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" | head -1)
        if [ -z "$PROJ_PATH" ]; then
          echo "No Comet project—listing all:"
          find . -name "*.xcodeproj" -o -name "*.xcworkspace"
          exit 1
        fi
        cd "$(dirname "$PROJ_PATH")"
        echo "Building in: $(pwd)"
        ls -la
        if [[ "$PROJ_PATH" == *.xcworkspace ]]; then
          xcodebuild test -workspace "$(basename "$PROJ_PATH")" -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        else
          xcodebuild test -project "$(basename "$PROJ_PATH")" -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        fi
    - name: Archive
      run: |
        PROJ_PATH=$(find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" | head -1)
        cd "$(dirname "$PROJ_PATH")"
        mkdir -p build
        if [[ "$PROJ_PATH" == *.xcworkspace ]]; then
          xcodebuild -workspace "$(basename "$PROJ_PATH")" -scheme Comet -archivePath build/Comet.xcarchive archive
        else
          xcodebuild -project "$(basename "$PROJ_PATH")" -scheme Comet -archivePath build/Comet.xcarchive archive
        fi
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: comet-messager-build
        path: build/
