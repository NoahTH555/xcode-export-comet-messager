name: Build Comet Xcode App from ZIP
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Unzip & Flatten
      run: |
        unzip '*.zip' -d temp_extract -q && rm *.zip || true
        # Flatten: move all contents to root (handles subdirs)
        find temp_extract -mindepth 1 -maxdepth 1 -exec mv {} . \;
        rm -rf temp_extract
        echo "=== FILES AFTER FLATTEN ==="
        ls -la | grep -E "(xcodeproj|xcworkspace|project|pods)"
    - name: Setup Xcode
      run: |
        sudo xcode-select --reset
        sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.0.app
        xcodebuild -version
    - name: Install Pods
      run: |
        if [ -f Podfile ]; then
          sudo gem install cocoapods
          pod install
        fi
    - name: Find & Build Project
      run: |
        PROJ_PATH=$(find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" | head -1)
        [ -z "$PROJ_PATH" ] && { echo "ERROR: No Comet project found! Check ZIP contents."; ls -la; exit 1; }
        PROJ_DIR=$(dirname "$PROJ_PATH")
        echo "Found project: $PROJ_PATH (dir: $PROJ_DIR)"
        cd "$PROJ_DIR"
        ls -la *.xcodeproj *.xcworkspace
        if [[ "$PROJ_PATH" == *.xcworkspace ]]; then
          xcodebuild test -workspace Comet.xcworkspace -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        else
          xcodebuild test -project Comet.xcodeproj -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        fi
    - name: Archive
      run: |
        PROJ_PATH=$(find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" | head -1)
        PROJ_DIR=$(dirname "$PROJ_PATH")
        cd "$PROJ_DIR"
        mkdir -p build
        if [[ "$PROJ_PATH" == *.xcworkspace ]]; then
          xcodebuild -workspace Comet.xcworkspace -scheme Comet -archivePath build/Comet.xcarchive archive
        else
          xcodebuild -project Comet.xcodeproj -scheme Comet -archivePath build/Comet.xcarchive archive
        fi
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: comet-build
        path: |
          build/
          **/*.xcarchive
