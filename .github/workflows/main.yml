name: Build Comet Xcode App from ZIP
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Unzip & Debug Structure
      run: |
        unzip -l '*.zip' || echo "No ZIP found"
        unzip '*.zip' -d temp_extract && rm *.zip || true
        echo "=== ROOT FILES ==="
        ls -la
        echo "=== XCODE PROJS ==="
        find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" -o -name "*.xcodeproj" | head -5 || echo "None found"
        echo "=== ALL DIRS ==="
        find . -type d -maxdepth 2 | head -10
        # Move contents to root if in subdir
        if [ -d "temp_extract" ]; then
          mv temp_extract/* . 2>/dev/null || mv temp_extract/*/* . 2>/dev/null || true
          rm -rf temp_extract
        fi
        ls -la *.xcodeproj *.xcworkspace || echo "Still no project in root"
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.0.app
        xcodebuild -version
    - name: Install Pods
      run: |
        if [ -f Podfile ]; then
          sudo gem install cocoapods
          pod install
        fi
    - name: Auto-Build (find & cd project dir)
      run: |
        PROJ_DIR=$(find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" | dirname)
        [ -z "$PROJ_DIR" ] && { echo "No Comet project found!"; exit 1; }
        echo "Project in: $PROJ_DIR"
        cd "$PROJ_DIR"
        ls -la
        if [ -f Comet.xcworkspace ]; then
          xcodebuild test -workspace Comet.xcworkspace -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        else
          xcodebuild test -project Comet.xcodeproj -scheme Comet -destination 'platform=iOS Simulator,name=iPhone 15'
        fi
    - name: Auto-Archive
      run: |
        PROJ_DIR=$(find . -name "Comet.xcodeproj" -o -name "Comet.xcworkspace" | dirname)
        cd "$PROJ_DIR"
        mkdir -p build
        if [ -f Comet.xcworkspace ]; then
          xcodebuild -workspace Comet.xcworkspace -scheme Comet -archivePath build/Comet.xcarchive archive
        else
          xcodebuild -project Comet.xcodeproj -scheme Comet -archivePath build/Comet.xcarchive archive
        fi
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: comet-build
        path: build/
