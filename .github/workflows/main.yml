name: Inspect & Build Messager
on: [push]
jobs:
  inspect:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Unzip & Full Reveal
      run: |
        unzip "Comet-Messager.zip" -d . -q -o && rm "Comet-Messager.zip"
        echo "=== TREE VIEW ==="
        find . -type f | head -50 | sort
        echo "=== APP/Swift FILES ==="
        find . -name "*.swift" -o -name "*.app" -o -name "Package.swift" | head -10 || echo "None"
        echo "=== Xcode FILES ==="
        find . -name "*.xcode*" -o -name "*.pbx*" -o -name "project.pbxproj" | head -10 || echo "NO XCODE PROJECT"
    - name: SPM Build Fallback (if Package.swift)
      run: |
        if [ -f Package.swift ]; then
          echo "SPM project—building..."
          swift build
          mkdir -p build
          cp -r .build/* build/
        else
          echo "No SPM or Xcode—upload raw files for manual fix"
          mkdir -p build/raw
          cp -r . build/raw/
        fi
    - name: Upload ZIP Contents
      uses: actions/upload-artifact@v4
      with:
        name: zip-contents
        path: |
          .
          build/
